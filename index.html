        const formatName = (name) => name.charAt(0).toUpperCase() + name.slice(1).replace(/-/g, ' ');
        const getImageUrl = (id) => `https://wsrv.nl/?url=raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png&w=200&output=webp&maxage=31536000`;

        const getThaiName = (engName) => {
            if (!engName) return '';
            if (THAI_NAMES_BASE[engName]) return THAI_NAMES_BASE[engName];
            if (engName === 'ho-oh') return 'โฮโอ';
            if (engName === 'porygon-z') return 'โพรีกอน Z';
            if (engName === 'jangmo-o') return 'จารังโกะ';
            if (engName === 'hakamo-o') return 'จารังโก';
            if (engName === 'kommo-o') return 'จาราแรนกา';
            if (engName === 'type-null') return 'ไทป์:นัล';
            
            if (engName === 'zygarde' || engName === 'zygarde-50') return 'ซีการ์ด (ฟอร์ม 50%)';
            if (engName === 'zygarde-10-power-construct' || engName === 'zygarde-10') return 'ซีการ์ด (ฟอร์ม 10%)';
            if (engName === 'zygarde-complete') return 'ซีการ์ด (เพอร์เฟกต์ฟอร์ม)';

            let baseEngName = engName;
            for (let i = 0; i < defaultSuffixes.length; i++) {
                if (engName.endsWith(defaultSuffixes[i])) { 
                    baseEngName = engName.replace(defaultSuffixes[i], ''); 
                    break; 
                }
            }
            if (THAI_NAMES_BASE[baseEngName]) return THAI_NAMES_BASE[baseEngName];
            
            let isSpecialForm = false;
            for (let i = 0; i < formKeywords.length; i++) {
                if (engName.includes(formKeywords[i])) { 
                    isSpecialForm = true; 
                    break; 
                }
            }

            if (isSpecialForm) {
                const baseOnly = engName.replace(formRegex, '');
                let thaiBase = THAI_NAMES_BASE[baseOnly] || formatName(baseOnly);
                if (engName.includes('-mega-x')) return `เมก้า${thaiBase} X`;
                if (engName.includes('-mega-y')) return `เมก้า${thaiBase} Y`;
                if (engName.includes('-mega')) return `เมก้า${thaiBase}`;
                if (engName.includes('-primal')) return `ต้นกาล${thaiBase}`;
                if (engName.includes('-gmax')) return `เคียวไดแมกซ์${thaiBase}`;
                if (engName.includes('-alola')) return `${thaiBase} (ฟอร์มอโลลา)`;
                if (engName.includes('-galar')) return `${thaiBase} (ฟอร์มกาลาร์)`;
                if (engName.includes('-hisui')) return `${thaiBase} (ฟอร์มฮิซุย)`;
                if (engName.includes('-paldea')) return `${thaiBase} (ฟอร์มพัลเดีย)`;
                if (engName.includes('-therian')) return `ร่างอวตาร${thaiBase}`;
                if (engName.includes('-origin')) return `ร่างดั้งเดิม${thaiBase}`;
                if (engName.includes('-ash')) return `ซาโตชิ${thaiBase}`;
                if (engName.includes('-eternamax')) return `มุเก็นไดแมกซ์${thaiBase}`;
            }
            return formatName(baseEngName);
        };

        const cardObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const pid = card.dataset.id;
                    if (pid && !card.dataset.loaded) {
                        card.dataset.loaded = 'true';
                        fetchCardDetails(pid, card);
                        observer.unobserve(card);
                    }
                }
            });
        }, { rootMargin: '200px' });

        async function initApp() {
            renderRegionFilters();
            
            document.getElementById('total-count').innerText = "1025";
            const loader = document.getElementById('home-loader');
            if(loader) loader.style.display = 'none';

            allPokemon = [...INITIAL_POKEMON];
            applyFilters();

            try {
                const data = await prefetchAPI;
                if (!data) return;
                
                const uniquePokemon = [];
                const seenNames = new Set();
                let idx = 0;

                function processChunk() {
                    const end = Math.min(idx + 50, data.results.length);
                    for (; idx < end; idx++) {
                        const p = data.results[idx];
                        const id = parseInt(p.url.split('/').slice(-2, -1)[0]);
                        const name_th = getThaiName(p.name);
                        
                        if (!seenNames.has(name_th)) {
                            seenNames.add(name_th);
                            uniquePokemon.push({ name: p.name, name_th: name_th, id: id, url: p.url });
                        }
                    }
                    
                    if (idx < data.results.length) {
                        requestAnimationFrame(() => setTimeout(processChunk, 5)); 
                    } else {
                        allPokemon = uniquePokemon;
                        if (!searchQuery && selectedRegionIndex === 0) {
                            filteredList = allPokemon;
                            document.getElementById('load-more-container').style.display = 'flex';
                        } else {
                            applyFilters(); 
                        }
                        setTimeout(() => fetchCompareData(), 500);
                    }
                }
                processChunk();

            } catch (error) {
                console.error("Failed to fetch pokemon list", error);
            }
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = document.getElementById('searchInput').value.toLowerCase();
                applyFilters();
            }, 300);
        }

        function applyFilters() {
            let list = allPokemon;
            
            if (searchQuery) {
                list = list.filter(p => p.name.toLowerCase().includes(searchQuery) || p.name_th.includes(searchQuery) || p.id.toString() === searchQuery);
            } else {
                list = list.filter(p => p.id <= 1025);
                const reg = REGIONS[selectedRegionIndex];
                if (reg.name !== 'ทั้งหมด') {
                    list = list.slice(reg.offset, reg.offset + reg.limit);
                }
            }
            
            filteredList = list;
            if (filteredList.length === 20 && !searchQuery && selectedRegionIndex === 0) {
                document.getElementById('total-count').innerText = "1025";
            } else {
                document.getElementById('total-count').innerText = filteredList.length;
            }
            
            if (typeof cardObserver !== 'undefined') {
                cardObserver.disconnect();
            }
            document.getElementById('pokemon-grid').innerHTML = '';
            currentlyRenderedCount = 0;
            displayLimit = ITEMS_PER_PAGE;
            
            renderNextBatch();
        }

                    </div>
                `;
                fragment.appendChild(div);
                cardObserver.observe(div); 
            });

            container.appendChild(fragment);
            currentlyRenderedCount += itemsToRender.length;
        }

        async function fetchCardDetails(id, card) {
            try {
                let data = pokemonCache.get(parseInt(id));
                if (!data) {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    data = await res.json();
                    pokemonCache.set(id, data);
                }

                const themeColor = TYPE_COLORS[data.types[0].type.name] || '#cbd5e1';
                const typesContainer = document.getElementById(`types-${id}`);
                
                if(card && typesContainer) {
                    card.style.background = `linear-gradient(145deg, ${themeColor}10 0%, rgba(255,255,255,0.9) 100%)`;
                    card.style.borderColor = `${themeColor}40`;
                    
                    const glow = document.createElement('div');
                    glow.className = "absolute -top-10 -right-10 w-32 h-32 md:w-40 md:h-40 rounded-full blur-3xl opacity-30 pointer-events-none";
                    glow.style.backgroundColor = themeColor;
                    card.prepend(glow);
                    
                    const idEl = card.querySelector('.italic');
                    if(idEl) idEl.style.color = themeColor;
                    
                    requestAnimationFrame(() => {
                        typesContainer.innerHTML = data.types.map(t => {
                            const textColor = ['grass', 'fire', 'water', 'electric', 'normal', 'flying', 'bug', 'ground', 'fairy', 'ice'].includes(t.type.name) ? 'text-slate-900' : 'text-white';
                            return `
                            <span class="${textColor} text-[9px] md:text-[11px] font-bold px-1.5 py-0.5 md:px-3 md:py-1 rounded-full uppercase tracking-widest shadow-sm md:shadow-lg inline-flex items-center gap-0.5 md:gap-1 max-w-[90%] truncate" style="background-color: ${TYPE_COLORS[t.type.name] || '#777'}">
                                <i class="${TYPE_ICONS[t.type.name] || 'ph-fill ph-circle'} text-[6px] md:text-[12px] shrink-0" aria-hidden="true"></i>
                                <span class="truncate">${TYPE_NAMES_TH[t.type.name] || t.type.name}</span>
                            </span>
                            `;
                        }).join('');
                    });
                }
            } catch(err) {
                console.error('Failed to load card details for', id, err);
            }
        }

        async function openDetail(id) {
            switchView('detail');
            const viewDetail = document.getElementById('view-detail');
            viewDetail.innerHTML = getLoaderHTML();

            try {
                let pokemonDetail = pokemonCache.get(parseInt(id));
                if (!pokemonDetail) {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    pokemonDetail = await res.json();
                    pokemonCache.set(parseInt(id), pokemonDetail);
                }
                
                pokemonDetail.name_th = getThaiName(pokemonDetail.name);

                let speciesDetail = null;
                let evoChain = null;
                let formsData = [];
                let translatedEntry = 'ไม่พบข้อมูลพฤติกรรมในฐานข้อมูลหลัก';

                if (pokemonDetail.species && pokemonDetail.species.url) {
                    const specRes = await fetch(pokemonDetail.species.url);
                    speciesDetail = await specRes.json();
                    
                    if (speciesDetail.varieties) {
                        const seenFormNames = new Set();
                        speciesDetail.varieties.filter(f => !f.is_default).forEach(v => {
                            const tName = getThaiName(v.pokemon.name);
                            if (!seenFormNames.has(tName)) {
                                seenFormNames.add(tName);
                                formsData.push(v);
                            }
                        });
                    }

                    if (speciesDetail.evolution_chain && speciesDetail.evolution_chain.url) {
                        const evoRes = await fetch(speciesDetail.evolution_chain.url);
                        const evoData = await evoRes.json();
                        evoChain = evoData.chain;
                    }

                    if (POKEDEX_ENTRIES_TH[pokemonDetail.id]) {
                        translatedEntry = POKEDEX_ENTRIES_TH[pokemonDetail.id];
                    } else {
                        const entry = speciesDetail.flavor_text_entries.find(f => f.language.name === 'en');
                        const engText = entry ? entry.flavor_text.replace(/[\n\f\r]/g, ' ') : '';
                        if (engText) {
                            translatedEntry = 'กำลังแปลภาษาไทยอัตโนมัติ...';
                            fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=th&dt=t&q=${encodeURIComponent(engText)}`)
                                .then(r => r.json())
                                .then(d => {
                                    const text = d[0].map(item => item[0]).join('');
                                    const entryEl = document.getElementById('pokedex-entry-text');
                                    if(entryEl) entryEl.innerText = text;
                                }).catch(() => {
                                    const entryEl = document.getElementById('pokedex-entry-text');
                                    if(entryEl) entryEl.innerText = `${engText}\n(ไม่สามารถเชื่อมต่อระบบแปลภาษาอัตโนมัติได้)`;
                                });
                        }
                    }
                }

                let weaknesses = [];
                try {
                    const typeNames = pokemonDetail.types.map(t => t.type.name);
                    const damageRelations = await Promise.all(typeNames.map(t => fetch(`https://pokeapi.co/api/v2/type/${t}`).then(r => r.json())));
                    
                    let damageMultiplier = {};
                    Object.keys(TYPE_COLORS).forEach(t => damageMultiplier[t] = 1); 
                    
                    damageRelations.forEach(typeData => {
                        const rel = typeData.damage_relations;
                        rel.double_damage_from.forEach(t => { if (damageMultiplier[t.name] !== undefined) damageMultiplier[t.name] *= 2; });
                        rel.half_damage_from.forEach(t => { if (damageMultiplier[t.name] !== undefined) damageMultiplier[t.name] *= 0.5; });
                        rel.no_damage_from.forEach(t => { if (damageMultiplier[t.name] !== undefined) damageMultiplier[t.name] *= 0; });
                    });

                    for (const t in damageMultiplier) {
                        if (damageMultiplier[t] > 1) {
                            weaknesses.push({ type: t, multiplier: damageMultiplier[t] });
                        }
                    }
                    weaknesses.sort((a, b) => b.multiplier - a.multiplier);
                } catch (e) {
                    console.error("Error fetching weaknesses", e);
                }

                renderDetailHTML(pokemonDetail, speciesDetail, formsData, evoChain, translatedEntry, weaknesses);

            } catch (error) {
                console.error(error);
                viewDetail.innerHTML = `<div class="text-center py-20"><p class="text-red-500 font-bold">เกิดข้อผิดพลาดในการโหลดข้อมูล</p><button onclick="switchView('home')" class="mt-4 px-6 py-2 bg-slate-200 text-slate-800 rounded-full font-bold text-sm md:text-base">กลับ</button></div>`;
            }
        }

                                <h3 class="text-xs md:text-xl font-black text-slate-700 mb-3 md:mb-8 flex items-center gap-1.5 md:gap-4">
                                    <i class="ph ph-sparkle text-amber-500 text-base md:text-2xl" aria-hidden="true"></i> สายวิวัฒนาการ
                                </h3>
                                <div class="flex items-center w-max min-w-full pb-2 md:pb-8 pt-1 md:pt-2 px-1 md:px-2">
                                    ${buildEvoNodeHTML(evoChain)}
                                </div>
                            </div>
                        ` : ''}

                    </div>
                </div>
            `;
            viewDetail.innerHTML = html;
        }


        // --- Compare View Logic ---

        function buildDropdownHTML(index, currentId) {
            const selected = allPokemon.find(p => p.id === currentId);
            return `
                <div class="relative w-full mb-2 md:mb-6 compare-dropdown" id="dropdown-${index}">
                    <button onclick="toggleCompareDropdown(${index})" class="w-full bg-white/80 backdrop-blur-md p-2 md:p-5 rounded-lg md:rounded-2xl flex justify-between items-center border border-white hover:border-red-400 transition-colors font-bold text-slate-700 shadow-md group text-[9px] md:text-base min-w-0">
                        <span class="truncate pr-1 flex-1 text-left" id="dropdown-text-${index}">${selected ? selected.name_th : 'เลือก...'}</span>
                        <i class="ph ph-caret-right text-slate-400 group-hover:text-red-400 transition-transform text-[10px] md:text-base shrink-0" id="dropdown-icon-${index}" aria-hidden="true"></i>
                    </button>
                    <div id="dropdown-menu-${index}" class="hidden absolute z-50 mt-1 md:mt-2 w-full bg-white/95 backdrop-blur-xl rounded-lg md:rounded-2xl shadow-2xl border border-white overflow-hidden">
                        <div class="p-1.5 md:p-4 border-b bg-slate-50/50">
                            <input type="text" onkeyup="filterCompareDropdown(${index}, this.value)" class="w-full p-1.5 md:p-3 bg-white rounded-md md:rounded-xl outline-none text-[9px] md:text-sm font-medium border border-slate-200 focus:border-red-300 transition-colors shadow-inner" placeholder="ค้นหาชื่อ..." aria-label="ค้นหาโปเกมอนเปรียบเทียบ">
                        </div>
                        <div class="max-h-40 md:max-h-60 overflow-y-auto custom-scrollbar" id="dropdown-list-${index}">
                            ${renderCompareListHTML(index, '')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCompareListHTML(index, query) {
            let list = allPokemon;
            if(query) {
                query = query.toLowerCase();
                list = list.filter(p => p.name.toLowerCase().includes(query) || p.name_th.includes(query) || p.id.toString() === query);
            }
            return list.slice(0, 50).map(p => `
                <div onclick="selectCompare(${index}, ${p.id})" class="p-1.5 md:p-4 hover:bg-red-50/50 cursor-pointer flex items-center gap-1.5 md:gap-4 border-b border-slate-50 last:border-0 transition-colors">
                    <img src="${getImageUrl(p.id)}" width="40" height="40" class="w-5 h-5 md:w-10 md:h-10 object-contain drop-shadow-sm" loading="lazy" alt="${p.name_th}" />
                    <div class="flex-1 text-[9px] md:text-sm font-bold text-slate-700 truncate">${p.name_th}</div>
                </div>
            `).join('');
        }

        function toggleCompareDropdown(index) {
            const menu = document.getElementById(`dropdown-menu-${index}`);
            const icon = document.getElementById(`dropdown-icon-${index}`);
            const isHidden = menu.classList.contains('hidden');
            
            // Close all first
            document.querySelectorAll('.compare-dropdown > div:nth-child(2)').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.compare-dropdown i').forEach(el => el.classList.remove('rotate-90'));

            if (isHidden) {
                menu.classList.remove('hidden');
                icon.classList.add('rotate-90');
            }
        }

        function filterCompareDropdown(index, query) {
            document.getElementById(`dropdown-list-${index}`).innerHTML = renderCompareListHTML(index, query);
        }

        function selectCompare(index, id) {
            compareIds[index] = id;
            document.getElementById(`dropdown-menu-${index}`).classList.add('hidden');
            document.getElementById(`dropdown-icon-${index}`).classList.remove('rotate-90');
            fetchCompareData();
        }

        async function fetchCompareData() {
            try {
                const results = await Promise.all(
                    compareIds.map(async id => {
                        let data = pokemonCache.get(id);
                        if (!data) {
                            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                            data = await r.json();
                            pokemonCache.set(id, data);
                        }
                        return data;
                    })
                );
                compareData = results.map(data => {
                    if(!data) return null;
                    data.name_th = getThaiName(data.name);
                    return data;
                });
                renderCompareView();
            } catch(e) {
                console.error("Error fetching compare data", e);
            }
        }

        function renderCompareView() {
            const renderCard = (index) => {
                const data = compareData[index];
                if (!data) return `<div class="p-10 md:p-32 flex justify-center w-full items-center"><i class="ph ph-spinner animate-spin text-slate-400 text-2xl md:text-4xl" aria-hidden="true"></i></div>`;
                
                const otherData = compareData[index === 0 ? 1 : 0];
                const themeColor = TYPE_COLORS[data.types[0].type.name] || '#777';

                const totalStats = data.stats.reduce((sum, s) => sum + s.base_stat, 0);
                const otherTotal = otherData ? otherData.stats.reduce((sum, s) => sum + s.base_stat, 0) : 0;
                const isTotalWinner = totalStats > otherTotal;

                let statsHtml = data.stats.map((s, idx) => {
                    const otherVal = otherData?.stats[idx]?.base_stat || 0;
                    const isWinner = s.base_stat > otherVal;
                    const statName = STAT_NAMES_TH[s.stat.name] || s.stat.name;
                    const percentage = Math.min((s.base_stat / 255) * 100, 100);
                    return `
                        <div class="flex items-center gap-1 md:gap-4 mb-1.5 md:mb-4 w-full min-w-0">
                            <span class="text-[7px] md:text-xs font-bold text-slate-500 uppercase tracking-tight w-7 sm:w-8 md:w-16 shrink-0 text-right truncate">${statName}</span>
                            <span class="text-[8px] md:text-sm font-black w-4 md:w-8 shrink-0 text-right ${isWinner ? 'text-emerald-500' : 'text-slate-700'}">${s.base_stat}</span>
                            <div class="flex-1 bg-slate-100/60 rounded-full h-1 md:h-2.5 overflow-hidden shadow-inner ml-1 md:ml-0 min-w-0">
                                <div class="h-full rounded-full transition-all duration-1000 relative ${isWinner ? 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.4)]' : 'bg-slate-300'}" 
                                     style="width: ${percentage}%;">
                                     <div class="absolute inset-0 bg-white/20" aria-hidden="true"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // บังคับ Layout ให้สมดุล 100% ทั้งบนมือถือและคอมพิวเตอร์
                return `
                    <div class="backdrop-blur-xl rounded-2xl md:rounded-[3rem] p-2 sm:p-3 md:p-10 border relative h-full flex flex-col transition-colors overflow-hidden w-full min-w-0"
                         style="border-color: ${themeColor}40; background: linear-gradient(145deg, ${themeColor}10 0%, rgba(255,255,255,0.85) 100%); box-shadow: 0 10px 30px -10px ${themeColor}20">
                        <div class="absolute -top-10 -left-10 w-24 h-24 md:w-64 md:h-64 rounded-full blur-xl md:blur-3xl opacity-20 pointer-events-none" style="background-color: ${themeColor}"></div>
                        
                        ${buildDropdownHTML(index, data.id)}
                        
                        <div class="flex flex-col items-center mb-2 md:mb-8 min-w-0">
                            <div class="w-16 h-16 sm:w-20 sm:h-20 md:w-56 md:h-56 mb-2 md:mb-8 bg-white rounded-xl md:rounded-[3.5rem] flex items-center justify-center p-2 md:p-12 relative shadow-inner border border-slate-50 overflow-hidden shrink-0">
                                <div class="absolute inset-0 bg-gradient-to-br from-slate-50 to-white"></div>
                                <img src="${getImageUrl(data.id)}" width="200" height="200" class="w-full h-full object-contain relative z-10 drop-shadow-lg md:drop-shadow-2xl animate-float" alt="${data.name_th}" />
                            </div>
                            <div class="text-[8px] md:text-2xl font-black italic tracking-widest mb-0.5 md:mb-2 opacity-90 drop-shadow-sm" style="color: ${themeColor}">
                                #${String(data.id).padStart(3, '0')}
                            </div>
                            <h2 class="text-xs sm:text-sm md:text-4xl font-black text-slate-800 tracking-tighter uppercase mb-1 md:mb-4 text-center leading-none truncate block w-full px-1">${data.name_th}</h2>
                            <!-- ⚡ CLS FIX: ใส่ h-6 md:h-8 คงที่ -->
                            <div class="flex justify-center gap-0.5 md:gap-2 mt-0.5 md:mt-0 h-6 md:h-8 overflow-hidden items-center shrink-0 w-full flex-wrap md:flex-nowrap">
                                ${data.types.map(t => {
                                    const textColor = TYPE_TEXT_COLORS[t.type.name] || 'text-white';
                                    return `
                                    <span class="${textColor} text-[6px] md:text-[11px] font-bold px-1.5 py-0.5 md:px-3 md:py-1 rounded-full uppercase tracking-widest shadow-sm md:shadow-lg inline-flex items-center gap-0.5 md:gap-1 max-w-[90%] truncate" style="background-color: ${TYPE_COLORS[t.type.name] || '#777'}">
                                        <i class="${TYPE_ICONS[t.type.name] || 'ph-fill ph-circle'} text-[6px] md:text-[12px] shrink-0" aria-hidden="true"></i>
                                        <span class="truncate">${TYPE_NAMES_TH[t.type.name] || t.type.name}</span>
                                    </span>
                                    `
                                }).join('')}
                            </div>
                        </div>
                        
                        <div class="flex-1 pt-2 md:pt-6 border-t border-white/50 flex flex-col min-w-0">
                            <div class="flex flex-col justify-center flex-1 w-full min-w-0">${statsHtml}</div>
                            <div class="mt-auto pt-2 md:pt-4 border-t border-white/50 flex justify-between items-center px-1 md:px-2 w-full min-w-0">
                                <span class="text-[7px] md:text-sm font-black text-slate-500 uppercase tracking-widest shrink-0">Total</span>
                                <span class="text-[10px] md:text-2xl font-black shrink-0 ${isTotalWinner ? 'text-emerald-500' : 'text-slate-700'}">${totalStats}</span>
                            </div>
                        </div>
                    </div>
                `;
            };

            document.getElementById('compare-card-0').innerHTML = renderCard(0);
            document.getElementById('compare-card-1').innerHTML = renderCard(1);
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.compare-dropdown')) {
                document.querySelectorAll('.compare-dropdown > div:nth-child(2)').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.compare-dropdown i').forEach(el => el.classList.remove('rotate-90'));
            }
        });

        // ⚡ LCP FIX: สั่งเริ่มระบบทันที
        initApp();

    </script>
</body>
</html>
